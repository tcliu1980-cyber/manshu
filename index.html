<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>劉曼曼的數學世界小學代數教學目錄</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-50 to-blue-50 text-slate-800">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <header class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4 text-blue-700">
        劉曼曼的數學世界<br/>
        小學代數教學目錄
      </h1>
      <p class="text-lg md:text-xl text-slate-700">
        請選擇要學習的代數形式
      </p>
    </header>

    <main class="space-y-6">
      <a
        href="algebraA.html"
        class="block bg-white rounded-3xl shadow-lg p-8 border border-blue-100 hover:shadow-xl hover:-translate-y-1 transition"
      >
        <div class="text-2xl md:text-3xl font-bold text-blue-800 text-center">
          □ × y = △
        </div>
      </a>

      <a
        href="algebraB.html"
        class="block bg-white rounded-3xl shadow-lg p-8 border border-blue-100 hover:shadow-xl hover:-translate-y-1 transition"
      >
        <div class="text-2xl md:text-3xl font-bold text-blue-800 text-center">
          □ × y + ◯ = △
        </div>
      </a>

      <a
        href="algebraC.html"
        class="block bg-white rounded-3xl shadow-lg p-8 border border-blue-100 hover:shadow-xl hover:-translate-y-1 transition"
      >
        <div class="text-2xl md:text-3xl font-bold text-blue-800 text-center">
          (y + □) / (y + △) = ◯
        </div>
      </a>
    </main>

    <footer class="mt-12 text-center text-slate-600 text-sm">
      <p>這是代數教學首頁，點選上方任一主題即可進入對應頁面。</p>
    </footer>
  </div>
</body>
</html>
